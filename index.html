<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crown Home Management</title>
</head>
<body>
    <h1>Connecting Premium Tenants with Crown Home Management</h1>
    
    <!-- Yahan properties show hongi -->
    <div id="properties-list"></div>

    <script>
        // Yeh script aapki 'properties' folder ki files ko fetch karegi
        fetch('/properties/')
            .then(response => response.text())
            .then(data => {
                document.getElementById('properties-list').innerHTML = "Properties load ho rahi hain... (Iske liye backend integration chahiye)";
            });
    </script>
</body>
</html>
